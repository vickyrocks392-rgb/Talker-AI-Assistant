name: Talker AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Lint, Typecheck and Build App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies (clean install for Tailwind native bindings)
        run: npm ci --ignore-optional

      - name: Run TypeScript Compiler (Type-check)
        run: npm run lint

      - name: Compile Production Build
        run: npm run build
        env:
          NODE_ENV: production
          GEMINI_API_KEY: "placeholder_to_prevent_build_error"